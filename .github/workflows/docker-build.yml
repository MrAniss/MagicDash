# Build & publish MagicDash Docker images to GitHub Container Registry on
# every push to main. The homeserver's Watchtower picks up the new images
# (`:latest` tag) within ~5 minutes and restarts the containers.
#
# First run requires that this repo's GHCR packages be made public OR that
# the homeserver authenticates to GHCR with a PAT. Public is simpler.
#
# Trigger manually with the "Run workflow" button if you want to force a
# rebuild without committing.

name: Build & Publish Docker Images

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Lower-case repo owner — GHCR requires lower-case namespaces.
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        component:
          - name: backend
            context: .
            dockerfile: backend/Dockerfile
          - name: frontend
            context: .
            dockerfile: frontend/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lower-case namespace
        id: ns
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.ns.outputs.value }}/magicdash-${{ matrix.component.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.component.context }}
          file: ${{ matrix.component.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
