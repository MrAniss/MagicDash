# MagicDash frontend nginx — serves the Vite build and proxies API calls
# to the `magicdash-backend` container on the internal Docker network.

upstream magicdash_backend {
    server magicdash-backend:3001;
}

server {
    listen 80;
    server_name _;

    # Static assets cache headers.
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # API & auth → backend.
    # `proxy_buffering off` keeps long-running responses (e.g. feed monitor
    # snapshots) from being held back by nginx's buffer.
    location /api/ {
        proxy_pass         http://magicdash_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 300s;
    }

    location /auth/ {
        proxy_pass         http://magicdash_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Health probe used by docker-compose healthcheck (optional).
    location = /health {
        proxy_pass         http://magicdash_backend/health;
    }

    # SPA — fall back to index.html for client-side routes.
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Reasonable upload limit for any future imports (CSV, screenshots, etc.).
    client_max_body_size 25m;
}
